server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:8h}
      cookie:
        same-site: ${COOKIE_SAME_SITE:none}
        secure: ${COOKIE_SECURE:true}

spring:
  application:
    name: beauty-textile
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximumPoolSize: ${DB_POOL_MAX:10}
      minimumIdle: ${DB_POOL_MIN:3}
      connectionTimeout: 30000
      initializationFailTimeout: 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  storage:
    provider: ${APP_STORAGE_PROVIDER:${STORAGE_PROVIDER:supabase}}
    supabase:
      project-url: ${SUPABASE_PROJECT_URL:${SUPABASE_URL:${SUPABASE_S3_ENDPOINT:}}}
      service-key: ${SUPABASE_SERVICE_KEY:${SUPABASE_KEY:}}
      bucket: ${SUPABASE_BUCKET:${SUPABASE_STORAGE_BUCKET:product-images}}
      public-base-url: ${SUPABASE_PUBLIC_BASE_URL:${SUPABASE_PUBLIC_URL:}}
  upload:
    dir: ${UPLOAD_DIR:/var/data/uploads/products}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://beauty-textile-frontend.pages.dev,https://*.pages.dev,https://*.onrender.com}
  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_SECRET:placeholder}
    currency: INR


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.beautytextile: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
