
# ============================================================
# Beauty Textile — PostgreSQL profile (Railway production)
# Activate with: SPRING_PROFILES_ACTIVE=postgresql
#
# Railway sets DATABASE_URL automatically when you link a PostgreSQL service.
# Format: postgresql://user:pass@host:port/dbname
# Spring needs JDBC format: jdbc:postgresql://host:port/dbname
# The env var DATABASE_URL below accepts Railway's JDBC_URL variable name.
# ============================================================

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  # Default embedded Tomcat allows 200 threads, which is far more than a 1-2 admin
  # deployment needs and adds unnecessary memory overhead on small instances.
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:20}
      min-spare: ${TOMCAT_MIN_THREADS:5}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:100}
    accept-count: ${TOMCAT_ACCEPT_COUNT:20}
    connection-timeout: 20000
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:8h}
      cookie:
        same-site: ${COOKIE_SAME_SITE:none}
        secure: ${COOKIE_SECURE:true}

spring:
  application:
    name: beauty-textile-backend

  datasource:
    # Railway injects DATABASE_URL as: postgresql://user:pass@host:port/db
    # We also accept JDBC_DATABASE_URL (Railway's JDBC-formatted variable)
    url: ${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/beauty_textile}}
    username: ${PGUSER:${DB_USERNAME:postgres}}
    password: ${PGPASSWORD:${DB_PASSWORD:elvis}}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Sized for 1-2 concurrent admin users, not general traffic — a smaller pool means
      # fewer DB connections/threads held in memory on constrained instances.
      maximumPoolSize: ${DB_POOL_MAX:5}
      minimumIdle: ${DB_POOL_MIN:1}
      connectionTimeout: 30000
      idleTimeout: 300000
      maxLifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  storage:
    provider: ${APP_STORAGE_PROVIDER:${STORAGE_PROVIDER:local}}
    supabase:
      project-url: ${SUPABASE_PROJECT_URL:${SUPABASE_URL:${SUPABASE_S3_ENDPOINT:}}}
      service-key: ${SUPABASE_SERVICE_KEY:${SUPABASE_KEY:}}
      bucket: ${SUPABASE_BUCKET:${SUPABASE_STORAGE_BUCKET:product-images}}
      public-base-url: ${SUPABASE_PUBLIC_BASE_URL:${SUPABASE_PUBLIC_URL:}}
  upload:
    dir: ${UPLOAD_DIR:/var/data/uploads/products}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:*}
  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_SECRET:placeholder}
    currency: INR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    # Disk-space indicator does a filesystem stat check on every health probe; not useful
    # for this app and removes periodic I/O overhead when Render polls the health endpoint.
    diskspace:
      enabled: false

logging:
  level:
    com.beautytextile: INFO
    org.springframework.security: WARN

