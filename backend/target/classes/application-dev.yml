server:
  port: 8080

spring:
  application:
    name: beauty-textile-backend
  datasource:
    url: jdbc:mysql://localhost:3306/beauty_textile?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximumPoolSize: 5
      minimumIdle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  upload:
    dir: ../uploads/products
  jwt:
    secret: dev-secret-key-change-in-production-must-be-32-bytes-long!!
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:*
  razorpay:
    enabled: false
    key-id: rzp_test_xxxxxxxx
    key-secret: xxxxxxxxxxxxxxxx
    currency: INR


logging:
  level:
    com.beautytextile: DEBUG
