name: Keep Backend Awake

# Render's free tier spins the web service down after ~15 minutes of no
# inbound HTTP traffic. The next real request then has to wait for a cold
# start (30-60+ seconds) before it responds — this is the "delay to connect"
# between the frontend and backend. A scheduled job *inside* the Spring Boot
# app can't prevent this (Render only counts external inbound traffic), so
# we ping the public health endpoint from GitHub Actions every 10 minutes
# instead, which keeps the service warm 24/7.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS -m 20 https://beauty-textile-backend.onrender.com/health \
            || curl -fsS -m 20 https://beauty-textile-backend.onrender.com/actuator/health \
            || echo "Ping failed (service may be cold-starting) — next scheduled run will retry."
