server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: ${COOKIE_SAME_SITE:none}
        secure: ${COOKIE_SECURE:true}

spring:
  application:
    name: beauty-textile
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  storage:
    provider: ${APP_STORAGE_PROVIDER:${STORAGE_PROVIDER:supabase}}
    supabase:
      project-url: ${SUPABASE_PROJECT_URL:https://ltbrawpolhbnfehmyoyt.supabase.co}
      service-key: ${SUPABASE_SERVICE_KEY:}
      bucket: ${SUPABASE_BUCKET:product-images}
      public-base-url: ${SUPABASE_PUBLIC_BASE_URL:https://ltbrawpolhbnfehmyoyt.supabase.co/storage/v1/object/public/product-images}
  upload:
    dir: ${UPLOAD_DIR:/var/data/uploads/products}
  cors:
    allowed-origins: https://beautytextile.web.app,https://beautytextile.com,https://beauty-textile-frontend.pages.dev,https://beauty-textile-backend.onrender.com
  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_SECRET:placeholder}
    currency: INR


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.beautytextile: INFO
    org.springframework.security: WARN
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
