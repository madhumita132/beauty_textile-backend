server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: lax
        secure: false

spring:
  application:
           name: beauty-textile
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  storage:
    provider: ${APP_STORAGE_PROVIDER:${STORAGE_PROVIDER:local}}
    supabase:
      project-url: ${SUPABASE_PROJECT_URL:}
      service-key: ${SUPABASE_SERVICE_KEY:}
      bucket: ${SUPABASE_BUCKET:product-images}
      public-base-url: ${SUPABASE_PUBLIC_BASE_URL:}
  upload:
    dir: ${UPLOAD_DIR:../uploads/products}
  jwt:
    secret: dev-secret-key-change-in-production-must-be-32-bytes-long!!
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:*
  razorpay:
    enabled: false
    key-id: rzp_test_xxxxxxxx
    key-secret: xxxxxxxxxxxxxxxx
    currency: INR


logging:
  level:
    com.beautytextile: DEBUG
