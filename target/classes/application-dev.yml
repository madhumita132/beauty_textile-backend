server:
  port: 8080

spring:
  application:
           name: beauty-textile
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  shop:
    name: Beauty Textile
    email: beautytextile.shop@gmail.com
    phone: "8344515186"
  upload:
    dir: ../uploads/products
  jwt:
    secret: dev-secret-key-change-in-production-must-be-32-bytes-long!!
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:*
  razorpay:
    enabled: false
    key-id: rzp_test_xxxxxxxx
    key-secret: xxxxxxxxxxxxxxxx
    currency: INR


logging:
  level:
    com.beautytextile: DEBUG
